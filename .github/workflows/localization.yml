name: Localization validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  localization:
    name: Validate and build localization bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        # 固定 actions/checkout v7.0.0。
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Set up Python
        # 固定 actions/setup-python v6.3.0。
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
      - name: Check setup
        run: make setup PYTHON_BIN=python
      - name: Check formatting
        run: make format-check PYTHON_BIN=python
      - name: Validate catalogs
        run: make lint PYTHON_BIN=python
      - name: Run tests
        run: make test PYTHON_BIN=python
      - name: Verify generated resources
        run: make generate-check PYTHON_BIN=python
      - name: Build deterministic bundle
        run: make build PYTHON_BIN=python
      - name: Verify bundle checksum
        working-directory: dist
        run: sha256sum --check linguamesh-l10n-0.1.0.zip.sha256
      - name: Upload development bundle
        # 固定 actions/upload-artifact v7.0.1。
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: linguamesh-l10n-0.1.0
          path: |
            dist/linguamesh-l10n-0.1.0.zip
            dist/linguamesh-l10n-0.1.0.zip.sha256
          if-no-files-found: error
          retention-days: 7
      - name: Validate repository foundation
        run: ./tools/check-foundation.sh
